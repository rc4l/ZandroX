# [rc4l] Run the test suite on every push/PR and build all three platforms on PRs and main,
# so platform-specific breakage shows up before merge instead of after.
name: Test & Build

on:
  # [rc4l] Main only, not every branch: a branch with an open PR would otherwise fire both
  # push and pull_request and run the whole workflow twice over the same commit.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  # [rc4l] PRs and main, but not every feature-branch push — the builds are the slow part.
  # Main is covered as well as PRs because an admin can push straight past the PR gate.
  # Advisory, not a required check: the Windows job depends on vcpkg and a pinned runner
  # image, and a hiccup there shouldn't block a merge that never touched Windows.
  build:
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('main-{0}', github.run_number) }}

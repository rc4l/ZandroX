# [rc4l] Reusable per-platform build called by test-and-build.yml (on PRs) and release.yml
# (on main and for releases), so a PR builds exactly what a release would ship.
name: build (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string baked into the archive names'
        required: false
        type: string
        default: dev

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ZandroX
        run: |
          # Native OpenAL build (no FMOD, no Rosetta) — arm64 on Apple Silicon runners.
          SOUND=1 ./mac_compile.sh

      # [rc4l] A silently soundless build has shipped before; refuse to package one.
      - name: Verify sound is linked
        run: |
          set -euo pipefail
          bin=build/ZandroX.app/Contents/MacOS/zandronum
          otool -L "$bin" | grep -q libopenal \
            || { echo "::error::$bin is not linked against libopenal — no sound"; exit 1; }
          test -f build/ZandroX.app/Contents/MacOS/libopenal.1.dylib \
            || { echo "::error::libopenal is not bundled in the .app"; exit 1; }
          echo "sound OK"; otool -L "$bin" | grep -iE 'openal|sndfile|mpg123'

      # [rc4l] ditto preserves the bundle's permissions and symlinks; upload-artifact's own
      # zipping drops the executable bit and produces an .app macOS refuses to launch.
      - name: Package ZandroX.app
        run: |
          set -euo pipefail
          mkdir -p dist-macos
          ditto -c -k --sequesterRsrc --keepParent \
            build/ZandroX.app "dist-macos/ZandroX-${{ inputs.version }}-macos-arm64.zip"
          ls -la dist-macos/

      - name: Upload ZandroX.app
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ZandroX-macos
          path: dist-macos/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ZandroX (Linux, via Docker)
        # [rc4l] VERSION is applied inside the container: on a Linux host it writes dist-linux
        # as root, so renaming the tarball afterwards fails with EACCES.
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Same Docker path we use locally on macOS — Ubuntu 22.04 base for wide
          # glibc compatibility. Produces dist-linux/ZandroX-<version>-linux-x86_64.tar.gz.
          ./package-linux.sh
          ls -la dist-linux/

      - name: Upload ZandroX Linux tarball
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ZandroX-linux
          path: dist-linux/*.tar.gz

  build-windows:
    # windows-2022 has Visual Studio 2022 (windows-latest moved to VS2026, whose
    # generator name differs and which CMake mis-detects). Matches the reference build.
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [rc4l] VCPKG_INSTALLATION_ROOT is a runner environment variable, and the env context in
      # an expression only sees workflow-level env: blocks — using it in the cache path below
      # silently yielded "/installed", which cached nothing. Resolve it in a step instead.
      - name: Resolve the vcpkg install path
        id: vcpkg
        shell: pwsh
        run: |
          $p = Join-Path $env:VCPKG_INSTALLATION_ROOT 'installed'
          "installed=$p" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "vcpkg installed tree: $p"

      # [rc4l] Building these from source took 15.5 of this job's 19 minutes. Restoring the
      # installed tree makes the vcpkg install inside the script a near-no-op; the key is the
      # build script's hash (the dep list lives there now), so it busts when the deps change.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.vcpkg.outputs.installed }}
          key: vcpkg-x64-windows-${{ hashFiles('windows_compile.ps1') }}
          restore-keys: vcpkg-x64-windows-

      # [rc4l] The whole compile — vcpkg deps, DirectX-SDK reshaping, CMake configure/build and
      # packaging — lives in windows_compile.ps1 so a contributor runs exactly what CI runs, and
      # CI verifies the script on every PR. Keep this a thin wrapper: no build logic here.
      - name: Compile ZandroX (windows_compile.ps1)
        shell: pwsh
        run: ./windows_compile.ps1 -Version "${{ inputs.version }}"

      - name: Upload ZandroX Windows build
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ZandroX-windows
          path: ZandroX-*-windows-x64.zip

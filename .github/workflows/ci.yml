# [rc4l] Run the test suite on every push/PR and build all three platforms on PRs, so
# platform-specific breakage shows up before merge instead of after.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  # [rc4l] Only on PRs: feature-branch pushes don't need the costly builds, and pushes to
  # main are already built by manual-build-latest.yml — building here too would duplicate it.
  # Advisory, not a required check: the Windows job depends on vcpkg and a pinned runner
  # image, and a hiccup there shouldn't block a merge that never touched Windows.
  build:
    needs: test
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_build.yml
    with:
      version: pr-${{ github.event.pull_request.number }}

name: Release

on:
  workflow_dispatch: # Trigger manually from the Actions tab
    inputs:
      release:
        description: 'Publish a GitHub Release from these builds'
        type: boolean
        default: false
      version:
        description: 'Release tag (e.g. v0.1.0) — required when "release" is checked'
        type: string
        default: ''
  push:
    branches: [main]
    tags: ['v*'] # [rc4l] Pushing a v* tag builds and publishes a release on its own.

# [rc4l] Needed by the publish job to create the release and upload its assets.
permissions:
  contents: write

jobs:
  # [rc4l] Resolves the version once so every job names its archives identically.
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      publish: ${{ steps.v.outputs.publish }}
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
            publish=true
          elif [ "${{ inputs.release }}" = "true" ]; then
            version="${{ inputs.version }}"
            publish=true
            # [rc4l] A release with no tag would publish over whatever "latest" points at.
            if [ -z "$version" ]; then
              echo "::error::'version' is required when 'release' is checked (e.g. v0.1.0)"
              exit 1
            fi
          else
            # [rc4l] Ordinary pushes still produce artifacts, just no release.
            version="dev-$(echo "${GITHUB_SHA}" | cut -c1-8)"
            publish=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "version=$version publish=$publish"

  # [rc4l] Releases are gated on the suite; ordinary pushes are already covered by ci.yml.
  test:
    if: github.ref_type == 'tag' || inputs.release
    uses: ./.github/workflows/_test.yml

  # [rc4l] The three platform builds live in _build.yml so ci.yml runs the same ones on PRs.
  build:
    needs: setup
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.setup.outputs.version }}

  # [rc4l] Collects the three platform archives into one GitHub Release. Only runs for a v* tag
  # or an explicit "release" dispatch; ordinary pushes stop after the build jobs.
  publish:
    if: needs.setup.outputs.publish == 'true'
    needs: [setup, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Show what will be published
        run: ls -laR assets/

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          set -euo pipefail
          # [rc4l] gh creates the tag at this commit when it does not already exist, so a
          # dispatch-triggered release needs no separate tag push.
          cat > notes.md <<'EOF'
          ZandroX build for macOS (Apple Silicon), Linux (x86_64) and Windows (x64).
          Audio is OpenAL on every platform; FMOD is gone.

          **macOS** — the app is not signed or notarized, so Gatekeeper will refuse it
          on first launch. Clear the quarantine flag after unzipping:

              xattr -dr com.apple.quarantine ZandroX.app

          **Linux** — needs `libopenal1`, `libsndfile1` and `libmpg123-0` from your
          distro's packages.

          **Windows** — the OpenAL and decoder DLLs ship next to `zandronum.exe`; keep
          them together.

          Every download bundles **Freedoom** (`freedoom2.wad`, BSD-3-clause — see
          `FREEDOOM-LICENSE.txt`), so it is playable as-is. To play commercial Doom
          instead, drop your own `doom2.wad` next to the executable.

          **Licensing** — ZandroX is GPL-3.0-or-later. Every download carries
          `LICENSE.txt` (the full GPL-3.0 text) and `THIRD-PARTY-NOTICES.txt`
          (bundled libraries and their licences). Complete corresponding source for
          this binary is the repository at this release's tag.
          EOF
          gh release create "$VERSION" \
            --title "ZandroX $VERSION" \
            --notes-file notes.md \
            assets/*

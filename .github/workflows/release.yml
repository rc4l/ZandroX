name: Release ZandroX

on:
  workflow_dispatch: # Trigger manually from the Actions tab
    inputs:
      release:
        description: 'Publish a GitHub Release from these builds (leave off to just build artifacts)'
        type: boolean
        default: false
      bump:
        description: 'Which part of the version to raise, counting from the newest v* tag'
        type: choice
        options: [patch, minor, major]
        default: patch
      experimental:
        description: 'Experimental: publish a PRE-RELEASE from the selected branch (ignores the bump; never a real release)'
        type: boolean
        default: false
  push:
    # [rc4l] Tags only. Building main is CI's job — this workflow exists to publish.
    tags: ['v*'] # [rc4l] Pushing a v* tag builds and publishes a release on its own.

# [rc4l] Needed by the publish job to create the release and upload its assets.
permissions:
  contents: write

# [rc4l] One release run per ref at a time. Two people triggering an experimental build on
# the same branch would otherwise race to delete-and-recreate its rolling tag; queueing
# serialises them. Different branches (and different tags) are independent groups.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # [rc4l] Resolves the version once so every job names its archives identically.
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      publish: ${{ steps.v.outputs.publish }}
      channel: ${{ steps.v.outputs.channel }}
      branch: ${{ steps.v.outputs.branch }}
      shortsha: ${{ steps.v.outputs.shortsha }}
    steps:
      # [rc4l] fetch-depth 0 brings the tags with it; the bump below reads them to find
      # the current version, and a shallow checkout would see none and restart at v0.0.1.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          # [rc4l] Defaults; the experimental path fills branch/shortsha, stable leaves them blank.
          channel=stable
          branch=""
          shortsha="$(echo "${GITHUB_SHA}" | cut -c1-8)"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
            publish=true
          elif [ "${{ inputs.experimental }}" = "true" ]; then
            # [rc4l] Experimental wins over release/bump: a pre-release built from whatever branch
            # the run was dispatched on, tagged by branch + commit (never a version) so it can
            # never touch the stable v* line. Including the short SHA means every commit keeps its
            # own pre-release instead of overwriting the branch's last one — re-building the same
            # commit refreshes just that tag (see the delete below). Sanitise the branch to a valid,
            # tidy tag; the SHA also disambiguates two branches whose names collapse to one slug.
            branch="${GITHUB_REF_NAME}"
            slug="$(echo "$branch" | sed 's#[^A-Za-z0-9._-]#-#g')"
            version="exp-${slug}-${shortsha}"
            publish=true
            channel=experimental
            echo "experimental pre-release from $branch ($shortsha) -> $version"
          elif [ "${{ inputs.release }}" = "true" ]; then
            # [rc4l] The version is derived, never typed: a hand-entered tag is how you get
            # v0.2.0 published twice, or a v0.10.0 that sorts below v0.9.0.
            latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
            latest="${latest:-v0.0.0}"
            IFS=. read -r major minor patch <<< "${latest#v}"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *)     patch=$((patch + 1)) ;;
            esac
            version="v${major}.${minor}.${patch}"
            publish=true
            echo "newest tag $latest, ${BUMP} bump -> $version"
            # [rc4l] Belt and braces: publishing onto an existing tag would move it off the
            # commit whose source the released binaries were built from.
            if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
              echo "::error::$version already exists — is another release in flight?"
              exit 1
            fi
          else
            # [rc4l] Ordinary pushes still produce artifacts, just no release.
            version="dev-$(echo "${GITHUB_SHA}" | cut -c1-8)"
            publish=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "shortsha=$shortsha" >> "$GITHUB_OUTPUT"
          echo "version=$version publish=$publish channel=$channel"

  # [rc4l] Stable releases are gated on the suite; ordinary pushes are already covered by
  # test-and-build.yml. Experimental builds deliberately skip it — the suite enforces 100%
  # coverage, which a work-in-progress branch will not meet, and the whole point is to get a
  # Windows binary into a tester's hands even while the branch is unfinished.
  test:
    if: github.ref_type == 'tag' || (inputs.release && !inputs.experimental)
    uses: ./.github/workflows/_test.yml

  # [rc4l] The three platform builds live in _build.yml so test-and-build.yml runs the same ones on PRs.
  build:
    needs: setup
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.setup.outputs.version }}

  # [rc4l] Collects the three platform archives into one GitHub Release. Runs for a v* tag, a
  # stable "release" dispatch, or an experimental pre-release; ordinary build-only dispatches
  # stop after the build jobs. always() is needed because the test job is skipped for
  # experimental builds — without it, a skipped dependency would skip publish too. The build
  # must always have succeeded; the suite must have passed only on the stable path.
  publish:
    needs: [setup, test, build]
    if: >-
      always()
      && needs.setup.outputs.publish == 'true'
      && needs.build.result == 'success'
      && (needs.setup.outputs.channel == 'experimental' || needs.test.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Show what will be published
        run: ls -laR assets/

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.setup.outputs.version }}
          CHANNEL: ${{ needs.setup.outputs.channel }}
          BRANCH: ${{ needs.setup.outputs.branch }}
          SHORTSHA: ${{ needs.setup.outputs.shortsha }}
        run: |
          set -euo pipefail

          # [rc4l] The platform notes are the same on both channels; keep them in one place.
          cat > body.md <<'EOF'
          ZandroX build for macOS (Apple Silicon), Linux (x86_64) and Windows (x64).
          Audio is OpenAL on every platform; FMOD is gone.

          **macOS** — the app is not signed or notarized, so Gatekeeper will refuse it
          on first launch. Clear the quarantine flag after unzipping:

              xattr -dr com.apple.quarantine ZandroX.app

          **Linux** — needs `libopenal1`, `libsndfile1` and `libmpg123-0` from your
          distro's packages.

          **Windows** — the OpenAL and decoder DLLs ship next to `zandronum.exe`; keep
          them together.

          Every download bundles **Freedoom** (`freedoom2.wad`, BSD-3-clause — see
          `FREEDOOM-LICENSE.txt`), so it is playable as-is. To play commercial Doom
          instead, drop your own `doom2.wad` next to the executable.

          **Licensing** — ZandroX is GPL-3.0-or-later. Every download carries
          `LICENSE.txt` (the full GPL-3.0 text) and `THIRD-PARTY-NOTICES.txt`
          (bundled libraries and their licenses). Complete corresponding source for
          this binary is the repository at this release's tag.
          EOF

          if [ "$CHANNEL" = "experimental" ]; then
            # [rc4l] Each commit keeps its own pre-release, so this only clears a release for the
            # SAME commit — i.e. rebuilding the exact same SHA refreshes that one tag instead of
            # erroring on it. A new commit gets a new tag and leaves earlier ones in place. First
            # build of a commit has nothing to delete, hence the || true.
            gh release delete "$VERSION" --yes --cleanup-tag || true

            # [rc4l] Loud banner prepended to the shared notes. The backslash-backticks stay
            # literal inside the double quotes while $BRANCH/$SHORTSHA expand.
            built="Built from branch \`${BRANCH}\` at commit \`${SHORTSHA}\` on $(date -u +%Y-%m-%d)."
            {
              printf '%s\n' "> ## 🧪 EXPERIMENTAL BUILD — NOT AN OFFICIAL RELEASE"
              printf '%s\n' ">"
              printf '%s\n' "> $built"
              printf '%s\n' "> Unofficial and unsupported — it may be broken or incomplete."
              printf '%s\n' "> For testing only. Do not treat this as a real ZandroX release."
              printf '%s\n' ""
            } > notes.md
            cat body.md >> notes.md

            # [rc4l] --prerelease keeps it off "Latest release"; --target ties the tag to the
            # branch the run was built from.
            gh release create "$VERSION" \
              --prerelease \
              --target "$BRANCH" \
              --title "🧪 EXPERIMENTAL — ${BRANCH} (${SHORTSHA})" \
              --notes-file notes.md \
              assets/*
          else
            # [rc4l] gh creates the tag at this commit when it does not already exist, so a
            # dispatch-triggered release needs no separate tag push.
            gh release create "$VERSION" \
              --title "ZandroX $VERSION" \
              --notes-file body.md \
              assets/*
          fi

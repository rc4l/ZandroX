# [rc4l] Reusable C++ test job called by test-and-build.yml and release.yml so the same suite gates both.
name: tests (reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # [rc4l] Linux fully supports AddressSanitizer/UBSan/LeakSanitizer, unlike macOS.
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tidy llvm

      - name: Configure (ASan + UBSan)
        run: >
          cmake -S tests -B build-tests -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DZANDROX_TESTS_SANITIZE=ON

      - name: Build
        run: cmake --build build-tests

      # [rc4l] ZScript tripwire: fail the build if VM/ZScript symbols enter compiled engine code
      # (policy: docs/zscript-insulation.md). A machine checks, not a person.
      - name: ZScript tripwire
        run: bash tools/zscript-tripwire.sh

      # [rc4l] Calls to APIs a staircase flight removed (born from the gluPerspective slip:
      # dependency removal is only as strict as the loosest platform unless a machine checks).
      - name: Removed-API tripwire
        run: bash tools/removed-api-tripwire.sh

      # [rc4l] Shader/fixed-function parity (born from the white-decal slip: upstream routes
      # state through shader-only uniforms; our macOS path stays fixed-function until the core
      # flip, so every shader-consumed field needs an FF fallback or a justified allowlist entry).
      - name: FF-parity tripwire
        run: bash tools/ff-parity-tripwire.sh

      # [rc4l] detect_leaks=1 turns on LeakSanitizer, which is supported here on Linux.
      - name: Run tests (ASan + UBSan + LeakSanitizer)
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-tests --output-on-failure

      # [rc4l] Enforce 100% line coverage on every tested unit — --auto derives the list from
      # each *_test.cpp's sibling, so new tests are gated automatically with no edit here.
      - name: Coverage (100% gate on tested units)
        run: bash tests/coverage.sh --auto

      # [rc4l] compile_commands.json comes from the configure step above. Tests are now
      # colocated in the engine tree, so lint every *_test.cpp there (absolute paths so
      # they match the compile_commands.json entries).
      - name: clang-tidy (report)
        run: clang-tidy -p build-tests $(find "$PWD/src/zandronum/src" -name '*_test.cpp')

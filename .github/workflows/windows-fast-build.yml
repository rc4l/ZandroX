# [rc4l] Verifies windows_build.ps1 (the prebuilt-deps fast path) on a real Windows runner.
# Path-filtered so it only runs when the fast build or its deps change — the normal per-PR
# Windows build already goes through windows_compile.ps1 in _build.yml.
name: Windows fast build

on:
  pull_request:
    paths:
      - windows_build.ps1
      - windows_assets/**
      - .github/workflows/windows-fast-build.yml
  workflow_dispatch:

jobs:
  fast-build:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ZandroX (windows_build.ps1, prebuilt deps)
        shell: pwsh
        run: ./windows_build.ps1 -Version "fast-ci"

      - name: Upload the build
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ZandroX-windows-fast
          path: ZandroX-*-windows-x64.zip
